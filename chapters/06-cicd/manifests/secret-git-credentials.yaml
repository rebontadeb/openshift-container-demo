# Git push credentials for the CI/CD pipeline's update-manifest Task.
# IMPORTANT: Create this imperatively — never commit a real token.
#
# task-update-manifest.yaml's git-commit-push step runs `git push origin HEAD`
# with no explicit auth of its own. It relies on Tekton's standard credential
# mechanism: a basic-auth Secret annotated with tekton.dev/git-0=<url> and
# attached to the ServiceAccount a PipelineRun runs as (financeflow-cicd, see
# pipelinerun-*.yaml) gets auto-injected as ~/.git-credentials / ~/.gitconfig
# into every step of that run — no workspace or Task changes required.
#
#   oc create secret generic git-credentials-cicd \
#     --type=kubernetes.io/basic-auth \
#     --from-literal=username=<your-github-username> \
#     --from-literal=password=<your-github-PAT-with-repo-scope> \
#     -n financeflow-workshop
#
#   oc annotate secret git-credentials-cicd \
#     tekton.dev/git-0=https://github.com \
#     -n financeflow-workshop
#
#   oc secrets link financeflow-cicd git-credentials-cicd -n financeflow-workshop
#
# This placeholder exists only to document the required keys/annotation —
# never apply it directly.
apiVersion: v1
kind: Secret
metadata:
  name: git-credentials-cicd
  namespace: financeflow-workshop
  labels:
    app: financeflow
  annotations:
    tekton.dev/git-0: https://github.com
type: kubernetes.io/basic-auth
stringData:
  username: REPLACE_WITH_GITHUB_USERNAME
  password: REPLACE_WITH_GITHUB_PAT
