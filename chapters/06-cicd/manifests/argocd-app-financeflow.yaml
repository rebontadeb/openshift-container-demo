apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: financeflow
  namespace: openshift-gitops    # ArgoCD control plane namespace
  labels:
    app: financeflow
  finalizers:
    - resources-finalizer.argocd.argoproj.io    # clean up cluster resources when app is deleted
spec:
  project: financeflow

  source:
    repoURL: https://github.com/rebontadeb/openshift-container-demo.git
    targetRevision: main
    path: chapters/02-deployments/manifests    # ArgoCD watches this directory

  destination:
    server: https://kubernetes.default.svc
    namespace: financeflow-workshop

  syncPolicy:
    automated:
      prune: true        # remove resources deleted from git
      selfHeal: true     # revert manual cluster changes — git is the source of truth
    syncOptions:
      - CreateNamespace=false    # namespace must already exist
      - ApplyOutOfSyncOnly=true  # only sync resources that actually differ

  # Health checks — ArgoCD uses these to determine sync success
  ignoreDifferences:
    # Ignore the replicas field — HPA manages this, not git
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
    # Ignore the container image — OpenShift's ImageStream lookupPolicy
    # (local: true) resolves the friendly tag (e.g. financeflow-account:v1.0)
    # to a pinned @sha256:... digest live, on every apply. Without this,
    # every Deployment using an ImageStream-backed image shows permanently
    # OutOfSync, since OpenShift keeps rewriting the field git doesn't have.
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/template/spec/containers/0/image
