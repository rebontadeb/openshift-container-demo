apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: update-manifest
  namespace: financeflow-workshop
  labels:
    app: financeflow
spec:
  description: |
    Update the image tag in a Deployment YAML and push the change back to git.
    This is the GitOps link — ArgoCD detects the commit and syncs the cluster.
  params:
    - name: service
      type: string
      description: "Deployment name to update: account-service, transaction-service, portal"
    - name: image-name
      type: string
      description: "ImageStream name: financeflow-account, financeflow-transaction, financeflow-portal"
    - name: image-tag
      type: string
      description: New image tag (typically the git short SHA from the build step)
    - name: git-user-name
      type: string
      default: "FinanceFlow Pipeline"
    - name: git-user-email
      type: string
      default: "pipeline@financeflow-workshop"
    - name: git-branch
      type: string
      default: "main"
      description: Branch to push the commit to
  workspaces:
    - name: source
      description: Cloned source repository (with write access via git credentials)
  steps:
    - name: update-yaml
      image: quay.io/openshift/origin-cli:latest
      workingDir: $(workspaces.source.path)
      script: |
        #!/usr/bin/env bash
        set -euo pipefail

        MANIFEST="chapters/02-deployments/manifests/deployment-$(params.service).yaml"
        IMAGE_NAME="$(params.image-name)"
        NEW_TAG="$(params.image-tag)"

        echo "Updating $MANIFEST → image: ${IMAGE_NAME}:${NEW_TAG}"

        # Replace the image tag in the Deployment YAML
        # Matches pattern: image: <any-image-name>:<tag>
        sed -i "s|image: .*$|image: ${IMAGE_NAME}:${NEW_TAG}|" "$MANIFEST"

        echo "Updated manifest:"
        grep "image:" "$MANIFEST"

    - name: git-commit-push
      image: alpine/git:latest
      workingDir: $(workspaces.source.path)
      script: |
        #!/bin/sh
        # alpine/git has no bash — only POSIX sh (no `pipefail`)
        set -eu

        # The clone step's container runs as a different UID than this one
        # (different Task = different pod, same shared PVC workspace) — git
        # refuses to trust a repo it doesn't own unless told otherwise, and
        # reports the confusing "not in a git directory" for non-global
        # commands when it does (git status shows the real reason: "detected
        # dubious ownership").
        git config --global --add safe.directory "$(workspaces.source.path)"

        git config user.name  "$(params.git-user-name)"
        git config user.email "$(params.git-user-email)"

        git add chapters/02-deployments/manifests/deployment-$(params.service).yaml
        git diff --cached --stat

        # [skip ci] is required, not cosmetic — eventlistener.yaml's CEL
        # filter checks for it specifically to stop this commit from
        # re-triggering the webhook and looping forever.
        git commit -m "ci: update $(params.service) image to $(params.image-tag) [skip ci]" || \
          echo "No changes to commit"

        # git-clone leaves the workspace in detached HEAD state (normal for
        # CI checkouts) — `git push origin HEAD` can't resolve a destination
        # ref from a commit object with no branch name attached, so the
        # branch must be spelled out explicitly on the remote side.
        git push origin HEAD:refs/heads/$(params.git-branch)
        echo "Pushed — ArgoCD will detect and sync"
