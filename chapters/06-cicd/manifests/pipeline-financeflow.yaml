apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: financeflow-pipeline
  namespace: financeflow-workshop
  labels:
    app: financeflow
spec:
  description: |
    CI pipeline for FinanceFlow services.
    Steps: clone → test → build image → tag in ImageStream → update manifest → ArgoCD syncs.

  params:
    - name: repo-url
      type: string
      description: Git repository URL
    - name: revision
      type: string
      description: Git branch, tag, or commit SHA
      default: main
    - name: service
      type: string
      description: "Service to build: account-service, transaction-service, portal"
    - name: image-name
      type: string
      description: "ImageStream name: financeflow-account, financeflow-transaction, financeflow-portal"
    - name: image-tag
      type: string
      description: Image tag — use git short SHA for traceability
      default: latest

  workspaces:
    - name: source
      description: Shared workspace for cloned source across all tasks
    - name: git-credentials
      description: Secret with .gitconfig and git credentials for the push step
      optional: true

  tasks:
    # ── Step 1: Clone the source repository ────────────────────────────────────
    - name: clone
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: git-clone
          - name: namespace
            value: openshift-pipelines
      workspaces:
        - name: output
          workspace: source
        - name: basic-auth
          workspace: git-credentials
      params:
        - name: URL
          value: $(params.repo-url)
        - name: REVISION
          value: $(params.revision)
        - name: DELETE_EXISTING
          value: "true"

    # ── Step 2: Run tests ───────────────────────────────────────────────────────
    - name: test
      runAfter: [clone]
      taskRef:
        name: run-tests
        kind: Task
      workspaces:
        - name: source
          workspace: source
      params:
        - name: service
          value: $(params.service)

    # ── Step 3: Build container image with buildah ──────────────────────────────
    - name: build
      runAfter: [test]
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: buildah
          - name: namespace
            value: openshift-pipelines
      workspaces:
        - name: source
          workspace: source
      params:
        - name: IMAGE
          value: image-registry.openshift-image-registry.svc:5000/financeflow-workshop/$(params.image-name):$(params.image-tag)
        - name: DOCKERFILE
          value: ./app/$(params.service)/Containerfile
        - name: CONTEXT
          value: ./app/$(params.service)
        - name: TLSVERIFY
          value: "false"    # internal registry uses self-signed cert

    # ── Step 4: Tag as stable version in ImageStream ────────────────────────────
    - name: tag-image
      runAfter: [build]
      taskRef:
        resolver: cluster
        params:
          - name: kind
            value: task
          - name: name
            value: openshift-client
          - name: namespace
            value: openshift-pipelines
      params:
        - name: SCRIPT
          value: |
            oc tag financeflow-workshop/$(params.image-name):$(params.image-tag) \
                   financeflow-workshop/$(params.image-name):stable
            echo "Tagged $(params.image-name):$(params.image-tag) as :stable"
            oc get imagestreamtag $(params.image-name):stable -o jsonpath='{.image.metadata.name}' | head -c 20

    # ── Step 5: Update manifest in git → ArgoCD auto-syncs ─────────────────────
    - name: update-manifest
      runAfter: [tag-image]
      taskRef:
        name: update-manifest
        kind: Task
      workspaces:
        - name: source
          workspace: source
      params:
        - name: service
          value: $(params.service)
        - name: image-name
          value: $(params.image-name)
        - name: image-tag
          value: $(params.image-tag)

  results:
    - name: image-digest
      description: Digest of the built image
      value: $(tasks.build.results.IMAGE_DIGEST)
