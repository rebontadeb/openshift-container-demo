# Create this secret IMPERATIVELY — never commit the real secret value:
#
#   oc create secret generic github-webhook-secret \
#     --from-literal=secret=$(openssl rand -hex 20)
#
# Then register the same value as the webhook secret in GitHub:
#   Repository → Settings → Webhooks → Add webhook
#   Payload URL: https://<route-host>
#   Content type: application/json
#   Secret: <value from above>
#   Events: Just the push event
#
# This placeholder is here only to document the required key name.
apiVersion: v1
kind: Secret
metadata:
  name: github-webhook-secret
  namespace: financeflow-workshop
  labels:
    app: financeflow
type: Opaque
stringData:
  secret: REPLACE_WITH_GENERATED_SECRET    # never commit a real value here
