apiVersion: kiali.io/v1alpha1
kind: Kiali
metadata:
  name: kiali
  namespace: istio-system
spec:
  auth:
    strategy: openshift
  deployment:
    accessible_namespaces:
      - financeflow-workshop
    cluster_wide_access: true
  external_services:
    prometheus:
      url: https://thanos-querier.openshift-monitoring.svc.cluster.local:9091
      auth:
        type: bearer
        use_kiali_token: true
      thanos_proxy:
        enabled: false
    custom_dashboards:
      prometheus:
        url: https://thanos-querier.openshift-monitoring.svc.cluster.local:9091
        auth:
          type: bearer
          use_kiali_token: true
    grafana:
      enabled: true
      # This cluster's actual Grafana route, created in Chapter 7
      # (`oc get route grafana -n grafana`). Every workshop cluster gets a
      # different *.apps.<cluster-id>.<domain> hostname — re-check and update
      # this after Chapter 7 on any other cluster; never copy this value
      # forward (a leftover host from a prior cluster would silently 404).
      url: https://grafana-grafana.apps.cluster-mxqd5.dynamic2.redhatworkshops.io
      in_cluster_url: http://financeflow-grafana-service.grafana.svc.cluster.local:3000
      auth:
        type: basic
        username: admin
        password: financeflow
  istio_namespace: istio-system
