# TempoMonolithic — single-binary Tempo deployment, ideal for demos/workshops.
# No object storage (S3/etc.) needed: traces are held in a 2Gi in-memory volume.
# jaegerui.enabled exposes a Jaeger-compatible UI (Tempo itself ships no native UI)
# at the Route tempo-financeflow-jaegerui.
apiVersion: tempo.grafana.com/v1alpha1
kind: TempoMonolithic
metadata:
  name: financeflow
  namespace: financeflow-workshop
  labels:
    app: financeflow
spec:
  storage:
    traces:
      backend: memory
      size: 2Gi
  jaegerui:
    enabled: true
    # NOTE: there is no top-level spec.route on TempoMonolithic — that field
    # doesn't exist in the CRD and gets silently dropped (no validation
    # error), so the Route never gets created despite jaegerui.enabled: true
    # working fine on its own. Route config is nested under jaegerui instead.
    route:
      enabled: true
  ingestion:
    otlp:
      grpc:
        enabled: true
      http:
        enabled: true
