apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: prometheus-thanos
  namespace: grafana
spec:
  instanceSelector:
    matchLabels:
      dashboards: financeflow
  datasource:
    name: Prometheus
    type: prometheus
    access: proxy
    isDefault: true
    url: https://thanos-querier.openshift-monitoring.svc.cluster.local:9091
    jsonData:
      httpMethod: POST
      httpHeaderName1: Authorization
      tlsSkipVerify: true
    secureJsonData:
      # ${BEARER_TOKEN} is a literal placeholder token, not a typo — the
      # Operator's valuesFrom (below) does a string substitution looking for
      # exactly this ${KEY} pattern inside the field value. Earlier attempts
      # put a plain string here instead ("REPLACE_ME...") — with no ${...}
      # pattern to find, valuesFrom had nothing to substitute and silently
      # left it untouched (no error, no log — just a permanently-wrong
      # value). Confirmed via grafana.github.io/grafana-operator's own
      # datasource example. The PATCH-via-API approach used previously
      # wasn't durable either: the Operator periodically reconciles this CR
      # against the live Grafana instance and overwrites any out-of-band
      # change with whatever's declared here.
      httpHeaderValue1: "${BEARER_TOKEN}"
  valuesFrom:
    - targetPath: "secureJsonData.httpHeaderValue1"
      valueFrom:
        secretKeyRef:
          name: grafana-thanos-bearer-token
          key: BEARER_TOKEN
