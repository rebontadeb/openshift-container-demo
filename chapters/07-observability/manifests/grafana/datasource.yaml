apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: prometheus-thanos
  namespace: grafana
spec:
  instanceSelector:
    matchLabels:
      dashboards: financeflow
  datasource:
    name: Prometheus
    type: prometheus
    access: proxy
    isDefault: true
    url: https://thanos-querier.openshift-monitoring.svc.cluster.local:9091
    jsonData:
      httpMethod: POST
      httpHeaderName1: Authorization
      tlsSkipVerify: true
    secureJsonData:
      httpHeaderValue1: "REPLACE_ME_VIA_API_PATCH_BELOW"
  # IMPORTANT: this CR alone is NOT enough — the real bearer token has to be
  # patched in imperatively after applying (same convention as
  # postgres-credentials / github-webhook-secret: never commit a real
  # secret value to a YAML file).
  #
  # Two templating mechanisms were tried and ruled out (both confirmed live):
  #   1. Grafana's native $__env{BEARER_TOKEN} provisioning-file syntax —
  #      doesn't get expanded for datasources this Operator creates via the
  #      HTTP API rather than a file on disk, even with the env var
  #      correctly present in the pod (verified with `oc exec ... env`).
  #   2. spec.valuesFrom (this Operator's own secret-injection field,
  #      confirmed to exist via `oc explain grafanadatasource.spec.valuesFrom`)
  #      — produced zero log activity in the operator about resolving the
  #      secret despite correct RBAC, and the datasource kept failing with
  #      401. Whatever this field expects, it isn't what's documented here.
  #
  # What's confirmed to work: PATCHing secureJsonData directly via Grafana's
  # own API after the datasource exists — see the imperative step in
  # chapters/07-observability/lab/07-observability.md / apply-order.txt.
