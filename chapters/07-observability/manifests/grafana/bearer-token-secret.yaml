# Generate this secret before applying the datasource:
#
#   TOKEN=$(oc create token grafana-sa -n grafana --duration=8760h)
#   oc create secret generic grafana-thanos-bearer-token \
#     --from-literal=BEARER_TOKEN="Bearer $TOKEN" \
#     -n grafana --dry-run=client -o yaml | oc apply -f -
#
# The datasource CR references this secret via environmentFrom.
apiVersion: v1
kind: Secret
metadata:
  name: grafana-thanos-bearer-token
  namespace: grafana
type: Opaque
stringData:
  BEARER_TOKEN: "Bearer REPLACE_WITH_GENERATED_TOKEN"
