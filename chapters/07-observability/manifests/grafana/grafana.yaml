apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: financeflow-grafana
  namespace: grafana
  labels:
    dashboards: financeflow
spec:
  config:
    security:
      admin_user: admin
      admin_password: financeflow
    auth:
      disable_login_form: "false"
    auth.anonymous:
      enabled: "true"
      org_role: Viewer
    server:
      root_url: "%(protocol)s://%(domain)s/"
  deployment:
    spec:
      template:
        spec:
          containers:
            - name: grafana
              # No envFrom/BEARER_TOKEN here — see datasource.yaml's comments
              # for why ($__env{} templating and spec.valuesFrom were both
              # tried and ruled out). The real token is PATCHed into the
              # datasource directly via Grafana's API instead.
              # 256Mi was too low — confirmed live, container hit OOMKilled
              # (exit code 137) repeatedly under normal operation, not just
              # under load. 512Mi still wasn't enough headroom: a freshly
              # started pod sat at 491Mi/512Mi (measured via oc adm top pod)
              # within minutes, idle, with one datasource and one dashboard —
              # about to OOM again.
              resources:
                requests:
                  cpu: 100m
                  memory: 512Mi
                limits:
                  cpu: 500m
                  memory: 1Gi
