apiVersion: opentelemetry.io/v1beta1
kind: OpenTelemetryCollector
metadata:
  name: financeflow
  namespace: financeflow-workshop
  labels:
    app: financeflow
spec:
  mode: deployment

  config:
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

      # There was a `prometheus` receiver here scraping account-service:8080
      # and transaction-service:8080 directly, re-exporting them on :8889
      # under a "financeflow_" prefix. Removed: it duplicated metrics
      # already correctly scraped via servicemonitor-account-service.yaml /
      # servicemonitor-transaction-service.yaml straight into Thanos (what
      # Grafana, Kiali, and prometheusrule-financeflow.yaml all actually
      # use) — and nothing in this repo ever consumed the duplicate. It was
      # also broken: no NetworkPolicy allows the collector pod (source) to
      # reach account-service/transaction-service on port 8080 — only
      # openshift-monitoring/openshift-user-workload-monitoring are allowed
      # in (see networkpolicy-allow-monitoring.yaml). Confirmed live via
      # Kiali: 100% error rate on that outbound traffic (response_code "0"
      # — connection-level failure, no HTTP response at all), which is what
      # actually shows up as "red"/Failure on the financeflow-collector
      # workload in the graph.

    processors:
      batch:
        timeout: 5s
        send_batch_size: 1000

      memory_limiter:
        limit_mib: 256
        spike_limit_mib: 64
        check_interval: 5s

      resource:
        attributes:
          - key: deployment.environment
            value: workshop
            action: insert

    exporters:
      debug:
        verbosity: normal

      otlp/tempo:
        endpoint: tempo-financeflow:4317
        tls:
          insecure: true

    service:
      pipelines:
        traces:
          receivers:  [otlp]
          processors: [memory_limiter, resource, batch]
          exporters:  [debug, otlp/tempo]
