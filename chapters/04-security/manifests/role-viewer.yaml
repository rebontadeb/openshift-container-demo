apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: financeflow-viewer
  namespace: financeflow-workshop
  labels:
    app: financeflow
  annotations:
    description: "Read-only access for developers — inspect pods, logs, services, routes"
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "services", "endpoints", "configmaps",
                "events", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["route.openshift.io"]
    resources: ["routes"]
    verbs: ["get", "list", "watch"]
  # Secrets are intentionally excluded — viewers cannot read credentials
