apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: financeflow-deployer
  namespace: financeflow-workshop
  labels:
    app: financeflow
  annotations:
    description: "Deploy and manage FinanceFlow resources — used by the CI/CD service account"
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps", "persistentvolumeclaims",
                "serviceaccounts"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["route.openshift.io"]
    resources: ["routes"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  # Secrets are NOT included — credentials must be created by a platform admin
  # ImageStreams and BuildConfigs managed separately in Chapter 1
