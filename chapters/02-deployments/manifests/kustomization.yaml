apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Apply all Chapter 2 manifests in dependency order:
#   oc apply -k chapters/02-deployments/manifests/
#
# NOTE: postgres-credentials is NOT in this list - secret-postgres.yaml is a
# placeholder (REPLACE_ME password) for documentation only. Create the real
# secret imperatively first (see Lab 2a Step 1) so a re-run of this kustomize
# apply never overwrites it.
resources:
  - pvc-postgres.yaml
  - configmap-account-service.yaml
  - configmap-transaction-service.yaml
  - configmap-portal-nginx.yaml
  - configmap-postgres-init.yaml
  - deployment-postgres.yaml
  - service-postgres.yaml
  - deployment-account-service.yaml
  - service-account-service.yaml
  - deployment-transaction-service.yaml
  - service-transaction-service.yaml
  - deployment-portal.yaml
  - service-portal.yaml
  - hpa-account-service.yaml
