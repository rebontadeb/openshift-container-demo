apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: financeflow-workshop
  labels:
    app: financeflow
    tier: database
spec:
  accessModes:
    - ReadWriteOnce       # single node — sufficient for PostgreSQL
  resources:
    requests:
      storage: 1Gi
  # storageClassName: gp3  # uncomment to pin a specific StorageClass
