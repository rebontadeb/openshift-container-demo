apiVersion: apps/v1
kind: Deployment
metadata:
  name: portal
  namespace: financeflow-workshop
  labels:
    app: financeflow
    tier: portal
spec:
  replicas: 3
  selector:
    matchLabels:
      app: financeflow
      tier: portal
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge:        1
  template:
    metadata:
      labels:
        app: financeflow
        tier: portal
    spec:
      # Set in Chapter 4 (Lab 4, Step 3) — committed here so Chapter 6's
      # ArgoCD selfHeal doesn't revert it back to the default SA on next sync
      serviceAccountName: financeflow-app
      containers:
        - name: portal
          image: financeflow-portal:v1.0
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          resources:
            requests:
              cpu:    50m
              memory: 64Mi
            limits:
              cpu:    200m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds:       15
            failureThreshold:    3
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 3
            periodSeconds:       10
            failureThreshold:    3
          volumeMounts:
            - name: nginx-conf
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          securityContext:
            runAsNonRoot:             true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: nginx-conf
          configMap:
            name: portal-nginx-conf
