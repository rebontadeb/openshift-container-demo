apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: account-service-hpa
  namespace: financeflow-workshop
  labels:
    app: financeflow
    tier: account-service
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: account-service
  minReplicas: 2    # never below 2 — financial service must stay available
  maxReplicas: 8
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type:               Utilization
          averageUtilization: 60    # scale up when avg CPU > 60%
    - type: Resource
      resource:
        name: memory
        target:
          type:               Utilization
          averageUtilization: 75    # scale up when avg memory > 75%
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30    # react quickly to load spikes
      policies:
        - type:          Pods
          value:         2             # add up to 2 pods at a time
          periodSeconds: 30
    scaleDown:
      stabilizationWindowSeconds: 120   # wait 2 min before scaling down
      policies:
        - type:          Pods
          value:         1             # remove only 1 pod at a time
          periodSeconds: 60
