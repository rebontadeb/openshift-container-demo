apiVersion: apps/v1
kind: Deployment
metadata:
  name: account-service
  namespace: financeflow-workshop
  labels:
    app: financeflow
    tier: account-service
  annotations:
    # Triggers a rollout when the referenced Secret or ConfigMap changes
    secret.reloader.stakater.com/reload: "postgres-credentials"
    configmap.reloader.stakater.com/reload: "account-service-config"
spec:
  replicas: 2              # minimum 2 for financial services — never go to 0
  selector:
    matchLabels:
      app: financeflow
      tier: account-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0    # zero downtime — always keep existing pods until new ones are Ready
      maxSurge:        1   # one extra pod during the rollout
  template:
    metadata:
      labels:
        app: financeflow
        tier: account-service
        version: v1.0   # selector.matchLabels stays app+tier only (immutable) —
                         # this label exists purely so Chapter 5's DestinationRule
                         # subset "v1-0" (selects version: v1.0) actually matches
                         # these pods instead of an empty subset
    spec:
      # Set in Chapter 4 (Lab 4, Step 3) — committed here so Chapter 6's
      # ArgoCD selfHeal doesn't revert it back to the default SA on next sync
      serviceAccountName: financeflow-app
      containers:
        - name: account-service
          image: financeflow-account:c691664e27d2563c8a7c5415afbc7392432fb81d
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          # ── Non-secret config from ConfigMap ────────────────────────────
          envFrom:
            - configMapRef:
                name: account-service-config
          # ── Secrets injected individually (not bulk envFrom) ────────────
          env:
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: DB_PASSWORD
          # ── Resources ──────────────────────────────────────────────────
          resources:
            requests:
              cpu:    100m
              memory: 128Mi
            limits:
              cpu:    500m
              memory: 256Mi
          # ── Probes ─────────────────────────────────────────────────────
          # startupProbe: gives the app up to 60s to start before liveness kicks in
          startupProbe:
            httpGet:
              path: /health/live
              port: 8080
            failureThreshold: 12
            periodSeconds:    5
          # livenessProbe: restarts the container if it becomes unresponsive
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            initialDelaySeconds: 0
            periodSeconds:       15
            failureThreshold:    3
          # readinessProbe: removes pod from Service endpoints if it can't serve traffic
          # (e.g. DB connection lost — pod stays running but no traffic until recovered)
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            initialDelaySeconds: 0
            periodSeconds:       10
            failureThreshold:    3
          # ── Security Context ────────────────────────────────────────────
          securityContext:
            runAsNonRoot:             true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
