# Ephemeral PostgreSQL VirtualMachine — failover demo for the containerized
# postgres Deployment (deployment-postgres.yaml).
#
# Requires OpenShift Virtualization (the kubevirt.io CRDs) installed on the
# cluster — not part of this workshop's prerequisites, install it separately
# first (OperatorHub -> "OpenShift Virtualization").
#
# Root disk is the official RHEL 9 KubeVirt containerDisk
# (registry.redhat.io/rhel9/rhel-guest-image) — pulling it requires the
# cluster's global pull secret to include registry.redhat.io credentials,
# which is standard on an entitled OpenShift subscription. If "latest" isn't
# available on your mirror, pin to a specific tag from registry.redhat.io.
#
# "Ephemeral" here means the VM's root disk is a containerDisk: a read-only
# container image layer with a copy-on-write overlay that is thrown away on
# every VM restart — no PersistentVolumeClaim/DataVolume is created for it,
# matching the ask for a throwaway, non-persistent VM (the seed data is
# re-applied by cloud-init on every boot, same as a fresh container would be).
#
# How the failover demo works:
#   1. This VM's pod template carries the same `tier: database` label as
#      deployment-postgres.yaml's pods. service-postgres.yaml's Service
#      (selector: tier: database) therefore load-balances across BOTH the
#      container pod and this VM's virt-launcher pod with zero changes to
#      the app's DB_HOST=postgres config.
#   2. Scale the container to 0 (`oc scale deployment/postgres --replicas=0`)
#      and the Service's only remaining endpoint is this VM — account-service
#      and transaction-service keep working unmodified.
#   3. A second, VM-only Service (postgres-vm, below) is included so the VM
#      can also be reached directly/unambiguously for verification, regardless
#      of whatever state the container Deployment is in.
#
# Credentials/db name are read from the existing postgres-credentials Secret
# at boot (mounted as a small virtio disk) instead of being hardcoded, so
# this stays correct even though deploy-demo.sh generates a random password.
apiVersion: kubevirt.io/v1
kind: VirtualMachine
metadata:
  name: postgres-vm
  namespace: financeflow-workshop
  labels:
    app: financeflow
    tier: database
spec:
  runStrategy: Always
  template:
    metadata:
      labels:
        app: financeflow
        tier: database
        kubevirt.io/domain: postgres-vm
    spec:
      domain:
        cpu:
          cores: 1
        resources:
          requests:
            memory: 1Gi
          limits:
            memory: 1Gi
        devices:
          disks:
            - name: rootdisk
              disk:
                bus: virtio
            - name: cloudinitdisk
              disk:
                bus: virtio
            - name: postgrescreds
              serial: postgrescreds
              disk:
                bus: virtio
          interfaces:
            - name: default
              masquerade: {}
              ports:
                - port: 5432
                  protocol: TCP
      networks:
        - name: default
          pod: {}
      volumes:
        - name: rootdisk
          containerDisk:
            image: registry.redhat.io/rhel9/rhel-guest-image:latest
        - name: postgrescreds
          secret:
            secretName: postgres-credentials
        - name: cloudinitdisk
          cloudInitNoCloud:
            userData: |
              #cloud-config
              package_update: true
              packages:
                - postgresql-server
                - postgresql-contrib
              write_files:
                - path: /tmp/init.sql
                  permissions: "0644"
                  content: |
                    -- FinanceFlow Database Initialization
                    -- Creates schema and seeds demo data for workshop
                    -- (identical to chapters/02-deployments/manifests/configmap-postgres-init.yaml)

                    CREATE EXTENSION IF NOT EXISTS "uuid-ossp";

                    -- ─── Accounts ──────────────────────────────────────────
                    CREATE TABLE IF NOT EXISTS accounts (
                        id              UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
                        owner_name      VARCHAR(255)    NOT NULL,
                        email           VARCHAR(255)    UNIQUE NOT NULL,
                        account_number  VARCHAR(20)     UNIQUE NOT NULL,
                        account_type    VARCHAR(20)     NOT NULL DEFAULT 'checking',
                        balance         DECIMAL(15, 2)  NOT NULL DEFAULT 0.00,
                        currency        VARCHAR(3)      NOT NULL DEFAULT 'USD',
                        status          VARCHAR(20)     NOT NULL DEFAULT 'active',
                        created_at      TIMESTAMPTZ     DEFAULT NOW(),
                        updated_at      TIMESTAMPTZ     DEFAULT NOW()
                    );

                    CREATE OR REPLACE FUNCTION update_updated_at()
                    RETURNS TRIGGER AS $$
                    BEGIN NEW.updated_at = NOW(); RETURN NEW; END;
                    $$ LANGUAGE plpgsql;

                    DROP TRIGGER IF EXISTS trg_accounts_updated_at ON accounts;
                    CREATE TRIGGER trg_accounts_updated_at
                        BEFORE UPDATE ON accounts
                        FOR EACH ROW EXECUTE FUNCTION update_updated_at();

                    -- ─── Transactions ──────────────────────────────────────
                    CREATE TABLE IF NOT EXISTS transactions (
                        id                  UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
                        from_account_id     UUID REFERENCES accounts(id),
                        to_account_id       UUID REFERENCES accounts(id),
                        amount              DECIMAL(15, 2)  NOT NULL CHECK (amount > 0),
                        currency            VARCHAR(3)      NOT NULL DEFAULT 'USD',
                        transaction_type    VARCHAR(30)     NOT NULL,
                        status              VARCHAR(20)     NOT NULL DEFAULT 'completed',
                        description         TEXT,
                        reference_number    VARCHAR(50)     UNIQUE NOT NULL,
                        created_at          TIMESTAMPTZ     DEFAULT NOW()
                    );

                    -- ─── Indexes ───────────────────────────────────────────
                    CREATE INDEX IF NOT EXISTS idx_transactions_from_account ON transactions(from_account_id);
                    CREATE INDEX IF NOT EXISTS idx_transactions_to_account   ON transactions(to_account_id);
                    CREATE INDEX IF NOT EXISTS idx_transactions_created_at  ON transactions(created_at DESC);
                    CREATE INDEX IF NOT EXISTS idx_accounts_status          ON accounts(status);

                    -- ─── Seed Data ─────────────────────────────────────────
                    INSERT INTO accounts (id, owner_name, email, account_number, account_type, balance) VALUES
                        ('11111111-1111-1111-1111-111111111111', 'Alice Johnson',  'alice@demo.financeflow',         'FF-0001-CHK', 'checking',   12450.75),
                        ('22222222-2222-2222-2222-222222222222', 'Alice Johnson',  'alice.savings@demo.financeflow',  'FF-0001-SAV', 'savings',    34200.00),
                        ('33333333-3333-3333-3333-333333333333', 'Bob Martinez',   'bob@demo.financeflow',            'FF-0002-CHK', 'checking',    8920.50),
                        ('44444444-4444-4444-4444-444444444444', 'Carol Chen',     'carol@demo.financeflow',          'FF-0003-CHK', 'checking',    5100.00),
                        ('55555555-5555-5555-5555-555555555555', 'Carol Chen',     'carol.invest@demo.financeflow',   'FF-0003-INV', 'investment', 98750.25)
                    ON CONFLICT DO NOTHING;

                    INSERT INTO transactions (from_account_id, to_account_id, amount, transaction_type, status, description, reference_number) VALUES
                        ('11111111-1111-1111-1111-111111111111', '33333333-3333-3333-3333-333333333333', 500.00,  'transfer',    'completed', 'Rent split March',     'REF-2024-001'),
                        ('33333333-3333-3333-3333-333333333333', '44444444-4444-4444-4444-444444444444', 150.00,  'transfer',    'completed', 'Dinner reimbursement', 'REF-2024-002'),
                        ('11111111-1111-1111-1111-111111111111', '22222222-2222-2222-2222-222222222222', 1000.00, 'transfer',    'completed', 'Monthly savings',      'REF-2024-003'),
                        (NULL,                                   '55555555-5555-5555-5555-555555555555', 5000.00, 'deposit',     'completed', 'Dividend payment',     'REF-2024-004'),
                        ('44444444-4444-4444-4444-444444444444', NULL,                                   200.00,  'withdrawal',  'completed', 'ATM withdrawal',        'REF-2024-005')
                    ON CONFLICT DO NOTHING;
              runcmd:
                - mkdir -p /mnt/creds
                - mount -o ro /dev/disk/by-id/virtio-postgrescreds /mnt/creds
                - export PG_DB_USER=$(cat /mnt/creds/POSTGRES_USER)
                - export PG_DB_PASSWORD=$(cat /mnt/creds/POSTGRES_PASSWORD)
                - export PG_DB_NAME=$(cat /mnt/creds/POSTGRES_DB)
                - postgresql-setup --initdb
                - sed -i "s/#listen_addresses = 'localhost'/listen_addresses = '*'/" /var/lib/pgsql/data/postgresql.conf
                - echo "host all all 0.0.0.0/0 md5" >> /var/lib/pgsql/data/pg_hba.conf
                - systemctl enable --now postgresql
                - sleep 5
                - su -c "psql -c \"ALTER USER postgres WITH PASSWORD '$PG_DB_PASSWORD';\"" postgres
                - su -c "psql -c \"CREATE USER \\\"$PG_DB_USER\\\" WITH PASSWORD '$PG_DB_PASSWORD';\"" postgres
                - su -c "psql -c \"CREATE DATABASE \\\"$PG_DB_NAME\\\" OWNER \\\"$PG_DB_USER\\\";\"" postgres
                - su -c "psql -d $PG_DB_NAME -f /tmp/init.sql" postgres
                - firewall-cmd --permanent --add-port=5432/tcp --zone=public || true
                - firewall-cmd --reload || true
---
# Direct/standalone access to the VM, independent of the container
# Deployment's state — the actual app failover instead relies on this VM's
# `tier: database` label being picked up by the existing service-postgres.yaml
# Service (see comment above).
apiVersion: v1
kind: Service
metadata:
  name: postgres-vm
  namespace: financeflow-workshop
  labels:
    app: financeflow
    tier: database
spec:
  selector:
    kubevirt.io/domain: postgres-vm
  ports:
    - name: postgres
      port: 5432
      targetPort: 5432
  type: ClusterIP
