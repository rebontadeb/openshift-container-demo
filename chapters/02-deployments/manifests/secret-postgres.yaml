# ──────────────────────────────────────────────────────────────────────────────
# PostgreSQL credentials Secret
# IMPORTANT: Replace placeholder values before applying.
# Better approach: create imperatively so the password never touches a file:
#
#   oc create secret generic postgres-credentials \
#     --from-literal=POSTGRES_USER=financeflow \
#     --from-literal=POSTGRES_PASSWORD=<your-strong-password> \
#     --from-literal=POSTGRES_DB=financeflow \
#     --from-literal=DB_USER=financeflow \
#     --from-literal=DB_PASSWORD=<your-strong-password> \
#     --from-literal=DB_NAME=financeflow
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: postgres-credentials
  namespace: financeflow-workshop
  labels:
    app: financeflow
    tier: database
type: Opaque
stringData:
  POSTGRES_USER:     financeflow
  POSTGRES_PASSWORD: REPLACE_ME
  POSTGRES_DB:       financeflow
  DB_USER:           financeflow
  DB_PASSWORD:       REPLACE_ME
  DB_NAME:           financeflow
