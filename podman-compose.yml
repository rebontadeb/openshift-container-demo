version: '3.9'

services:

  postgres:
    image: postgres:15-alpine
    env_file: .env
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./app/database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro,Z
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10
#----------------------------------------------------------
  account-service:
    build:
      context: ./app/account-service
      dockerfile: Containerfile
    env_file: .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      PORT:    8080
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health/ready')"]
      interval: 10s
      timeout: 5s
      retries: 5
#----------------------------------------------------------
  transaction-service:
    build:
      context: ./app/transaction-service
      dockerfile: Containerfile
    env_file: .env
    environment:
      DB_HOST:             postgres
      DB_PORT:             5432
      DB_NAME:             ${DB_NAME}
      DB_USER:             ${DB_USER}
      DB_PASSWORD:         ${DB_PASSWORD}
      ACCOUNT_SERVICE_URL: http://account-service:8080
      PORT:                8080
    ports:
      - "8082:8080"
    depends_on:
      account-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health/ready')"]
      interval: 10s
      timeout: 5s
      retries: 5
#----------------------------------------------------------
  portal:
    build:
      context: ./app/portal
      dockerfile: Containerfile
    ports:
      - "8080:8080"
    depends_on:
      account-service:
        condition: service_healthy
      transaction-service:
        condition: service_healthy

volumes:
  postgres-data:
